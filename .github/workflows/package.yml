name: Package

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-master
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test tests

  package:
    name: Package
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release packages
        run: bun run package:all

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ftpc-packages
          path: dist/packages/*
          if-no-files-found: error

  publish-master:
    name: Publish master package
    needs: package
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ftpc-${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: ftpc-packages
          path: dist/packages

      - name: Verify checksums
        run: |
          cd dist/packages
          sha256sum -c checksums.txt

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Publish GitHub release
        run: |
          notes="Automated ftpc package from master commit ${GITHUB_SHA}."
          gh release create "$RELEASE_TAG" \
            dist/packages/*.tar.gz \
            dist/packages/checksums.txt \
            --title "ftpc master build ${GITHUB_SHA}" \
            --notes "$notes" \
            --prerelease
