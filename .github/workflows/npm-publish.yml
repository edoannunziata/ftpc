name: Publish npm package

on:
  push:
    branches:
      - production
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-production
  cancel-in-progress: false

jobs:
  publish:
    name: Verify and publish
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test tests

      - name: Build native npm packages
        run: bun run package:npm

      - name: Set up Node for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Verify release version
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          cli_version="$(bun run src/index.ts --version)"

          if [ "$package_version" != "$cli_version" ]; then
            echo "::error::package.json version $package_version does not match CLI version $cli_version"
            exit 1
          fi

          if [ "$(npm view "$package_name@$package_version" version 2>/dev/null || true)" = "$package_version" ]; then
            echo "::error::$package_name@$package_version is already published; bump the version before pushing to production"
            exit 1
          fi

      - name: Inspect npm package contents
        run: |
          for package_dir in dist/npm/*; do
            npm pack "$package_dir" --dry-run
          done

      - name: Publish native npm packages
        run: |
          publish_package() {
            package_dir="$1"
            package_name="$(node -p "require('./$package_dir/package.json').name")"
            package_version="$(node -p "require('./$package_dir/package.json').version")"

            if [ "$(npm view "$package_name@$package_version" version 2>/dev/null || true)" = "$package_version" ]; then
              echo "$package_name@$package_version is already published"
              return
            fi

            npm publish "$package_dir" --access public --provenance
          }

          for package_dir in dist/npm/ftpc-*; do
            publish_package "$package_dir"
          done

          publish_package dist/npm/ftpc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
